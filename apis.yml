apis:
  - aid: auth0:auth0-management-api
    name: Auth0 Management API
    description: >-
      The Auth0 Management API enables programmatic management of your Auth0
      tenant, including users, connections, applications, rules, and logs.
    humanURL: https://auth0.com/docs/api/management/v2
    baseURL: https://your-tenant.auth0.com/api/v2
    tags:
