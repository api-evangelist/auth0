aid: auth0
name: Auth0
description: 'Auth0 (now part of Okta) is a leading identity and access management platform providing
  secure authentication and authorization for applications, APIs, and devices. It implements OpenID Connect,
  OAuth 2.0, and SAML 2.0 protocols and offers a Management API, Authentication API, My Account API, and
  My Organization API for programmatic control over identity infrastructure.

  '
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Authentication
  - Authorization
  - Identity Management
  - OAuth
  - Okta
  - OpenID Connect
  - SAML
  - Security
url: https://raw.githubusercontent.com/api-evangelist/auth0/refs/heads/main/apis.yml
created: '2024-04-14'
modified: '2026-05-04'
specificationVersion: '0.19'
apis:
  - aid: auth0:auth0-management-api
    name: Auth0 Management API
    description: The Auth0 Management API enables programmatic management of your Auth0 tenant, including
      users, connections, applications, rules, and logs.
    humanURL: https://auth0.com/docs/api/management/v2
    baseURL: https://your-tenant.auth0.com/api/v2
    tags:
      - Authentication
      - Identity
      - User Management
    properties:
      - type: Documentation
        url: https://auth0.com/docs/api/management/v2
      - type: GettingStarted
        url: https://auth0.com/docs/get-started
      - type: Authentication
        url: https://auth0.com/docs/secure/tokens
      - type: OpenAPI
        url: openapi/auth0-api-openapi.yml
  - aid: auth0:auth0-authentication-api
    name: Auth0 Authentication API
    description: The Auth0 Authentication API implements OpenID Connect and OAuth 2.0 protocols for authentication
      and authorization.
    humanURL: https://auth0.com/docs/api/authentication
    baseURL: https://your-tenant.auth0.com
    tags:
      - Authentication
      - OAuth
      - OpenID Connect
    properties:
      - type: Documentation
        url: https://auth0.com/docs/api/authentication
      - type: APIReference
        url: https://auth0.com/docs/api/authentication
  - aid: auth0:auth0-my-account-api
    name: Auth0 My Account API
    description: 'The Auth0 My Account API provides user self-service endpoints for managing authentication
      factors, authentication methods, and account settings.

      '
    humanURL: https://auth0.com/docs/api/myaccount
    baseURL: https://your-tenant.auth0.com
    tags:
      - Account Management
      - Authentication
      - MFA
      - Self-Service
    properties:
      - type: Documentation
        url: https://auth0.com/docs/api/myaccount
  - aid: auth0:auth0-my-organization-api
    name: Auth0 My Organization API
    description: 'The Auth0 My Organization API provides organization-scoped endpoints for business customers
      to manage their own Organizations, including IdP configuration, SCIM, and Home Realm Discovery.

      '
    humanURL: https://auth0.com/docs/api/myorganization
    baseURL: https://your-tenant.auth0.com
    tags:
      - Authentication
      - B2B
      - Identity
      - Organizations
    properties:
      - type: Documentation
        url: https://auth0.com/docs/api/myorganization
