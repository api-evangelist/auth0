aid: auth0
name: Auth0
description: >
  Auth0 (now part of Okta) is a leading identity-as-a-service platform providing
  authentication and authorization for applications, APIs, and AI agents. It implements
  OpenID Connect, OAuth 2.0, SAML 2.0, WS-Federation, and SCIM, and exposes a Management
  API (OpenAPI 3.1, 221 paths, 2,567 schemas), an Authentication API, a My Account API,
  a My Organization API, FGA (Fine-Grained Authorization, OpenFGA / Zanzibar-based),
  and Auth0 for AI Agents — covering Token Vault, asynchronous authorization, Auth for
  MCP, and FGA for RAG.
type: Index
