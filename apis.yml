- aid: auth0:auth0-fga
  name: Auth0 FGA (Fine-Grained Authorization)
  description: >
    Auth0 FGA is the hosted offering of OpenFGA, the CNCF authorization service
    inspired by Google's Zanzibar. Provides relationship-based access control
    via stores, authorization models, tuples, check, expand, list-objects, and
    list-users endpoints. Used for B2B hierarchical permissions and FGA for RAG
    in AI agent retrieval pipelines.
  humanURL: https://docs.fga.dev
  baseURL: https://api.{region}.fga.dev
  tags:
  - Authorization
  - FGA
