specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Auth0
providerId: auth0
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Identity
  - Authentication
  - B2B SaaS
description: Auth0 (Okta) per-MAU pricing. B2C and B2B plans differ in price.
sources:
  - https://auth0.com/pricing
plans:
  - id: auth0-free
    name: Free
    type: freemium
    description: Free; up to 25,000 MAUs.
    entries:
      - label: MAUs
        name: mau
        type: quota
        metric: MAU
        limit: 25000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 1 Custom Domain
      - name: Secure Agentic AI workflows
      - name: Passwordless
      - name: Unlimited social connections
      - name: 5 Organizations
      - name: 1 Enterprise Connection
      - name: Self-Service SSO
      - name: SCIM
  - id: auth0-essentials
    name: Essentials
    type: paid
    description: $35/mo (B2C) | $150/mo (B2B); starting at 500 MAUs.
    entries:
      - label: Monthly base (B2C)
        name: base_b2c
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '35.00'
        userMultiplied: false
      - label: Monthly base (B2B)
        name: base_b2b
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '150.00'
        userMultiplied: false
      - label: MAUs included
        name: mau
        type: quota
        metric: MAU
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Higher Auth/API limits
      - name: Pro MFA
      - name: RBAC
      - name: 10 Organizations (B2C) / Unlimited (B2B)
      - name: Audit Log streaming
      - name: Standard Support
  - id: auth0-professional
    name: Professional
    type: paid
    description: $240/mo (B2C) | $800/mo (B2B); starting at 500 MAUs.
    entries:
      - label: Monthly base (B2C)
        name: base_b2c
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '240.00'
        userMultiplied: false
      - label: Monthly base (B2B)
        name: base_b2b
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '800.00'
        userMultiplied: false
