      - name: Custom Database Connections
      - name: Enterprise MFA
      - name: Security Center
      - name: M2M Token add-on
  - id: auth0-enterprise
    name: Enterprise
    type: enterprise
    description: Custom pricing.
    entries:
      - label: Annual (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Custom User & SSO Tiers
      - name: 99.99% SLA
      - name: Enterprise Rate Limits
      - name: Enterprise Administration & Support
      - name: Advanced Security Features
      - name: Private Deployment
