naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Roles"
  description: Auth0 Management API capability covering the Roles resource group (4 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 10 operations.
  tags:
  - Auth0
  - Management API
  - Roles
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-roles
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Roles resource group. Self-contained."
    resources:
    - name: roles
      path: /roles
      operations:
      - name: get_roles
        method: GET
        description: Get Roles
        outputRawFormat: json
      - name: post_roles
        method: POST
        description: Create a Role
        outputRawFormat: json
    - name: roles-id
      path: /roles/{id}
      operations:
      - name: get_roles_by_id
        method: GET
        description: Get a Role
        outputRawFormat: json
      - name: delete_roles_by_id
        method: DELETE
        description: Delete a Role
        outputRawFormat: json
      - name: patch_roles_by_id
        method: PATCH
        description: Update a Role
        outputRawFormat: json
    - name: roles-id-permissions
      path: /roles/{id}/permissions
      operations:
      - name: get_role_permission
        method: GET
        description: Get Permissions Granted by Role
        outputRawFormat: json
      - name: delete_role_permission_assignment
        method: DELETE
        description: Remove Permissions from a Role
        outputRawFormat: json
      - name: post_role_permission_assignment
        method: POST
        description: Associate Permissions with a Role
        outputRawFormat: json
    - name: roles-id-users
      path: /roles/{id}/users
      operations:
      - name: get_role_user
        method: GET
        description: Get a Role's Users
        outputRawFormat: json
      - name: post_role_users
        method: POST
        description: Assign Users to a Role
        outputRawFormat: json
