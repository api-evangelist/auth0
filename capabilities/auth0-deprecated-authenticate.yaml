        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: tokeninfo
      path: /tokeninfo
      operations:
      - name: tokeninfo
        method: POST
        description: Auth0 [Deprecated] Return a user profile based on the user's JWT
