naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Stats"
  description: Auth0 Management API capability covering the Stats resource group (2 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 2 operations.
  tags:
  - Auth0
  - Management API
  - Stats
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-stats
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Stats resource group. Self-contained."
    resources:
    - name: stats-active-users
      path: /stats/active-users
      operations:
      - name: get_active-users
        method: GET
        description: Get Active Users Count
        outputRawFormat: json
    - name: stats-daily
      path: /stats/daily
      operations:
      - name: get_daily
        method: GET
        description: Get Daily Stats
        outputRawFormat: json
