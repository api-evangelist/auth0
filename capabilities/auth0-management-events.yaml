naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Events"
  description: Auth0 Management API capability covering the Events resource group (1 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 1 operations.
  tags:
  - Auth0
  - Management API
  - Events
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-events
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Events resource group. Self-contained."
    resources:
    - name: events
      path: /events
      operations:
      - name: subscribe_events
        method: GET
        description: Subscribe to Events Via Server-Sent Events (SSE)
        outputRawFormat: json
