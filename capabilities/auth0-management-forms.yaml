naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Forms"
  description: Auth0 Management API capability covering the Forms resource group (2 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 5 operations.
  tags:
  - Auth0
  - Management API
  - Forms
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-forms
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Forms resource group. Self-contained."
    resources:
    - name: forms
      path: /forms
      operations:
      - name: get_forms
        method: GET
        description: Get Forms
        outputRawFormat: json
      - name: create_form
        method: POST
        description: Create a Form
        outputRawFormat: json
    - name: forms-id
      path: /forms/{id}
      operations:
      - name: get_form
        method: GET
        description: Get a Form
        outputRawFormat: json
      - name: delete_form
        method: DELETE
        description: Delete a Form
        outputRawFormat: json
      - name: patch_form
        method: PATCH
        description: Update a Form
        outputRawFormat: json
