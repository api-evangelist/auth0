  description: 'Auth0 API — WS-Fed. 1 operations. Lead operation: Auth0 This endpoint returns the WS-Federation metadata..
    Self-contained Naftiko capability covering one Auth0 business surface.'
  tags:
  - Auth0
  - WS-Fed
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTH0_API_KEY: AUTH0_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth0-ws-fed
    baseUri: ''
    description: Auth0 API — WS-Fed business capability. Self-contained, no shared references.
    resources:
