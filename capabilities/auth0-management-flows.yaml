naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Flows"
  description: Auth0 Management API capability covering the Flows resource group (6 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 13 operations.
  tags:
  - Auth0
  - Management API
  - Flows
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-flows
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Flows resource group. Self-contained."
    resources:
    - name: flows
      path: /flows
      operations:
      - name: get_flows
        method: GET
        description: Get Flows
        outputRawFormat: json
      - name: post_flows
        method: POST
        description: Create a Flow
        outputRawFormat: json
    - name: flows-vault-connections
      path: /flows/vault/connections
      operations:
      - name: get_flows_vault_connections
        method: GET
        description: Get Flows Vault Connection List
        outputRawFormat: json
      - name: post_flows_vault_connections
        method: POST
        description: Create a Flows Vault Connection
        outputRawFormat: json
    - name: flows-vault-connections-id
      path: /flows/vault/connections/{id}
      operations:
      - name: get_flows_vault_connections_by_id
        method: GET
        description: Get a Flows Vault Connection
        outputRawFormat: json
      - name: delete_flows_vault_connections_by_id
        method: DELETE
        description: Delete a Flows Vault Connection
        outputRawFormat: json
      - name: patch_flows_vault_connections_by_id
        method: PATCH
        description: Update a Flows Vault Connection
        outputRawFormat: json
    - name: flows-flow_id-executions
      path: /flows/{flow_id}/executions
      operations:
      - name: get_flows_executions
        method: GET
        description: Get Flow Executions
        outputRawFormat: json
    - name: flows-flow_id-executions-execution_id
      path: /flows/{flow_id}/executions/{execution_id}
      operations:
      - name: get_flows_executions_by_execution_id
        method: GET
        description: Get a Flow Execution
        outputRawFormat: json
      - name: delete_flows_executions_by_execution_id
        method: DELETE
        description: Delete a Flow Execution
        outputRawFormat: json
    - name: flows-id
      path: /flows/{id}
      operations:
      - name: get_flows_by_id
        method: GET
        description: Get a Flow
        outputRawFormat: json
      - name: delete_flows_by_id
        method: DELETE
        description: Delete a Flow
        outputRawFormat: json
      - name: patch_flows_by_id
        method: PATCH
        description: Update a Flow
        outputRawFormat: json
