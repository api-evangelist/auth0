naftiko: 1.0.0-alpha2
info:
  label: Auth0 API — WS-Federation
  description: 'Auth0 API — WS-Federation. 1 operations. Lead operation: Auth0 This endpoint accepts a WS-Federation request
    to initiate a login.. Self-contained Naftiko capability covering one Auth0 business surface.'
  tags:
  - Auth0
  - WS-Federation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTH0_API_KEY: AUTH0_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth0-ws-federation
    baseUri: ''
    description: Auth0 API — WS-Federation business capability. Self-contained, no shared references.
    resources:
    - name: wsfed-client_id
      path: /wsfed/{client_id}
      operations:
      - name: wsfedlogin
        method: GET
        description: Auth0 This endpoint accepts a WS-Federation request to initiate a login.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: client_id
          in: path
          type: string
          description: The client-id of your application.
          required: true
        - name: wtrealm
          in: query
          type: string
          description: Can be used in place of client-id.
        - name: whr
          in: query
          type: string
          description: The name of the connection (used to skip the login page).
        - name: wctx
          in: query
          type: string
          description: Your application's state.
        - name: wreply
          in: query
          type: string
          description: The callback URL.
  exposes:
  - type: rest
    namespace: auth0-ws-federation-rest
    port: 8080
    description: REST adapter for Auth0 API — WS-Federation. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/wsfed/{client-id}
      name: wsfed-client-id
      description: REST surface for wsfed-client_id.
      operations:
      - method: GET
        name: wsfedlogin
        description: Auth0 This endpoint accepts a WS-Federation request to initiate a login.
        call: auth0-ws-federation.wsfedlogin
        with:
          client_id: rest.client_id
          wtrealm: rest.wtrealm
          whr: rest.whr
          wctx: rest.wctx
          wreply: rest.wreply
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auth0-ws-federation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Auth0 API — WS-Federation. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: auth0-this-endpoint-accepts-ws
      description: Auth0 This endpoint accepts a WS-Federation request to initiate a login.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: auth0-ws-federation.wsfedlogin
      with:
        client_id: tools.client_id
        wtrealm: tools.wtrealm
        whr: tools.whr
        wctx: tools.wctx
        wreply: tools.wreply
      outputParameters:
      - type: object
        mapping: $.
