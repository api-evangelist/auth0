naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Verifiable Credentials"
  description: Auth0 Management API capability covering the Verifiable Credentials resource group (2 paths). Self-contained Naftiko capability
    covering one Auth0 Management surface. 5 operations.
  tags:
  - Auth0
  - Management API
  - Verifiable Credentials
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-verifiable-credentials
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Verifiable Credentials resource group. Self-contained."
    resources:
    - name: verifiable-credentials-verification-templates
      path: /verifiable-credentials/verification/templates
      operations:
      - name: get_vc_templates
        method: GET
        description: List Verifiable Credential Templates for a Tenant.
        outputRawFormat: json
      - name: post_vc_templates
        method: POST
        description: Create a Verifiable Credential Template.
        outputRawFormat: json
    - name: verifiable-credentials-verification-templates-id
      path: /verifiable-credentials/verification/templates/{id}
      operations:
      - name: get_vc_templates_by_id
        method: GET
        description: Get a Verifiable Credential Template by ID.
        outputRawFormat: json
      - name: delete_vc_templates_by_id
        method: DELETE
        description: Delete a Verifiable Credential Template by ID.
        outputRawFormat: json
      - name: patch_vc_templates_by_id
        method: PATCH
        description: Update a Verifiable Credential Template by ID.
        outputRawFormat: json
