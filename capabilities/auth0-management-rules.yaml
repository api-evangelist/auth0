naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Rules"
  description: Auth0 Management API capability covering the Rules resource group (2 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 5 operations.
  tags:
  - Auth0
  - Management API
  - Rules
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-rules
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Rules resource group. Self-contained."
    resources:
    - name: rules
      path: /rules
      operations:
      - name: get_rules
        method: GET
        description: Get Rules
        outputRawFormat: json
      - name: post_rules
        method: POST
        description: Create a Rule
        outputRawFormat: json
    - name: rules-id
      path: /rules/{id}
      operations:
      - name: get_rules_by_id
        method: GET
        description: Get a Rule
        outputRawFormat: json
      - name: delete_rules_by_id
        method: DELETE
        description: Delete a Rule
        outputRawFormat: json
      - name: patch_rules_by_id
        method: PATCH
        description: Update a Rule
        outputRawFormat: json
