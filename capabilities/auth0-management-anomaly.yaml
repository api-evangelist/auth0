naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Anomaly"
  description: Auth0 Management API capability covering the Anomaly resource group (1 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 2 operations.
  tags:
  - Auth0
  - Management API
  - Anomaly
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-anomaly
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Anomaly resource group. Self-contained."
    resources:
    - name: anomaly-blocks-ips-id
      path: /anomaly/blocks/ips/{id}
      operations:
      - name: get_ips_by_id
        method: GET
        description: Check If an IP Address Is Blocked
        outputRawFormat: json
      - name: delete_ips_by_id
        method: DELETE
        description: Remove the Blocked IP Address
        outputRawFormat: json
