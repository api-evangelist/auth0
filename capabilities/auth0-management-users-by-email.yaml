naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Users By Email"
  description: Auth0 Management API capability covering the Users By Email resource group (1 paths). Self-contained Naftiko capability covering
    one Auth0 Management surface. 1 operations.
  tags:
  - Auth0
  - Management API
  - Users By Email
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
