    description: "Auth0 Management API \u2014 Users By Email resource group. Self-contained."
    resources:
    - name: users-by-email
      path: /users-by-email
      operations:
      - name: get_users-by-email
        method: GET
        description: Search Users by Email
        outputRawFormat: json
