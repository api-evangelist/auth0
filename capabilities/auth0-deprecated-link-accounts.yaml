      name: unlink
      description: REST surface for unlink.
      operations:
      - method: POST
        name: unlink
        description: Auth0 Unlink an account
        call: auth0-deprecated-link-accounts.unlink
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
