naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Grants"
  description: Auth0 Management API capability covering the Grants resource group (2 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 3 operations.
  tags:
  - Auth0
  - Management API
  - Grants
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-grants
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Grants resource group. Self-contained."
    resources:
    - name: grants
      path: /grants
      operations:
      - name: get_grants
        method: GET
        description: Get Grants
        outputRawFormat: json
      - name: delete_grants_by_user_id
        method: DELETE
        description: Delete a Grant by User_id
        outputRawFormat: json
    - name: grants-id
      path: /grants/{id}
      operations:
      - name: delete_grants_by_id
        method: DELETE
        description: Delete a Grant by Id
        outputRawFormat: json
