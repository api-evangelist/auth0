naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Logs"
  description: Auth0 Management API capability covering the Logs resource group (2 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 2 operations.
  tags:
  - Auth0
  - Management API
  - Logs
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-logs
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Logs resource group. Self-contained."
    resources:
    - name: logs
      path: /logs
      operations:
      - name: get_logs
        method: GET
        description: Search Log Events
        outputRawFormat: json
    - name: logs-id
      path: /logs/{id}
      operations:
      - name: get_logs_by_id
        method: GET
        description: Get a Log Event by Id
        outputRawFormat: json
