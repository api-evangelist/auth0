naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Log Streams"
  description: Auth0 Management API capability covering the Log Streams resource group (2 paths). Self-contained Naftiko capability covering one
    Auth0 Management surface. 5 operations.
  tags:
  - Auth0
  - Management API
  - Log Streams
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-log-streams
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Log Streams resource group. Self-contained."
    resources:
    - name: log-streams
      path: /log-streams
      operations:
      - name: get_log-streams
        method: GET
        description: Get Log Streams
        outputRawFormat: json
      - name: post_log-streams
        method: POST
        description: Create a Log Stream
        outputRawFormat: json
    - name: log-streams-id
      path: /log-streams/{id}
      operations:
      - name: get_log-streams_by_id
        method: GET
        description: Get Log Stream by ID
        outputRawFormat: json
      - name: delete_log-streams_by_id
        method: DELETE
        description: Delete Log Stream
        outputRawFormat: json
      - name: patch_log-streams_by_id
        method: PATCH
        description: Update a Log Stream
        outputRawFormat: json
