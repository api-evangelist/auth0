naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Tenants"
  description: Auth0 Management API capability covering the Tenants resource group (1 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 2 operations.
  tags:
  - Auth0
  - Management API
  - Tenants
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-tenants
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Tenants resource group. Self-contained."
    resources:
    - name: tenants-settings
      path: /tenants/settings
      operations:
      - name: tenant_settings_route
        method: GET
        description: Get Tenant Settings
        outputRawFormat: json
      - name: patch_settings
        method: PATCH
        description: Update Tenant Settings
        outputRawFormat: json
