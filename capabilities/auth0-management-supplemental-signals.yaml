naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Supplemental Signals"
  description: Auth0 Management API capability covering the Supplemental Signals resource group (1 paths). Self-contained Naftiko capability covering
    one Auth0 Management surface. 2 operations.
  tags:
  - Auth0
  - Management API
  - Supplemental Signals
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-supplemental-signals
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Supplemental Signals resource group. Self-contained."
    resources:
    - name: supplemental-signals
      path: /supplemental-signals
      operations:
      - name: get_supplemental-signals
        method: GET
        description: Get the Supplemental Signals Configuration for a Tenant
        outputRawFormat: json
      - name: patch_supplemental-signals
        method: PATCH
        description: Update the Supplemental Signals Configuration for a Tenant
        outputRawFormat: json
