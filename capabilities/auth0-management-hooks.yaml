naftiko: 1.0.0-alpha2
info:
  label: "Auth0 Management API \u2014 Hooks"
  description: Auth0 Management API capability covering the Hooks resource group (3 paths). Self-contained Naftiko capability covering one Auth0
    Management surface. 9 operations.
  tags:
  - Auth0
  - Management API
  - Hooks
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AUTH0_DOMAIN: AUTH0_DOMAIN
    AUTH0_MGMT_TOKEN: AUTH0_MGMT_TOKEN
capability:
  consumes:
  - type: http
    namespace: auth0-management-hooks
    baseUri: https://{AUTH0_DOMAIN}/api/v2
    description: "Auth0 Management API \u2014 Hooks resource group. Self-contained."
    resources:
    - name: hooks
      path: /hooks
      operations:
      - name: get_hooks
        method: GET
        description: Get Hooks
        outputRawFormat: json
      - name: post_hooks
        method: POST
        description: Create a Hook
        outputRawFormat: json
    - name: hooks-id
      path: /hooks/{id}
      operations:
      - name: get_hooks_by_id
        method: GET
        description: Get a Hook
        outputRawFormat: json
      - name: delete_hooks_by_id
        method: DELETE
        description: Delete a Hook
        outputRawFormat: json
      - name: patch_hooks_by_id
        method: PATCH
        description: Update a Hook
        outputRawFormat: json
    - name: hooks-id-secrets
      path: /hooks/{id}/secrets
      operations:
      - name: get_secrets
        method: GET
        description: Get Hook Secrets
        outputRawFormat: json
      - name: delete_secrets
        method: DELETE
        description: Delete Hook Secrets
        outputRawFormat: json
      - name: patch_secrets
        method: PATCH
        description: Update Hook Secrets
        outputRawFormat: json
      - name: post_secrets
        method: POST
        description: Add Hook Secrets
        outputRawFormat: json
