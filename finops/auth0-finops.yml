specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Auth0
providerId: auth0
created: '2026-05-04'
modified: '2026-05-22'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Identity
description: FOCUS-aligned FinOps for Auth0.
sources:
  - https://auth0.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Auth0
serviceCategory: Identity
billingModel:
  pricingCategory: Per-MAU + Tier
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: Auth0
  ServiceCategory: Identity
  ProviderName: Auth0
  PublisherName: Auth0
  BillingCurrency: USD
meters:
  - name: monthly_active_users
    unit: MAU
    aggregation: max
  - name: m2m_tokens
    unit: token
    aggregation: sum
  - name: enterprise_connections
    unit: connection-month
    aggregation: max
  - name: organizations
    unit: org-month
    aggregation: max
  - name: ai_agents_addon
    unit: percent-of-base
    aggregation: max
    description: Auth0 for AI Agents add-on is priced at 50% of base plan price.
  - name: token_vault_credentials
    unit: stored-credential-month
    aggregation: max
    description: Counts of API credentials (Google, GitHub, Slack, etc.) stored in Token Vault.
  - name: fga_tuples
    unit: tuple-month
    aggregation: max
    description: FGA relationship tuples stored per month (capacity-tier billed).
principles:
  - name: Visibility
    description: Track Auth0 consumption monthly.
  - name: Allocation
    description: Tag usage to teams/cost centers.
  - name: Optimization
    description: Right-size tier; reclaim unused entitlements.
  - name: Accountability
    description: Set spend alerts; quarterly review.
